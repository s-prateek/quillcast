platforms:
  linkedin:
    enabled: true
    token_file: data/tokens/linkedin.json

  facebook:
    enabled: false   # flip to true when ready — no code changes needed
    token_file: data/tokens/facebook.json

  blog:
    enabled: false
    type: ghost      # ghost | wordpress | hugo_github
    token_file: data/tokens/blog.json

rss_feeds:
  - url: https://hnrss.org/frontpage
    category: tech
  - url: https://feeds.feedburner.com/TechCrunch
    category: tech
  - url: https://www.theverge.com/rss/index.xml
    category: tech

rss_filter:
  min_article_age_hours: 1
  max_article_age_hours: 48
  max_articles_per_run: 5
